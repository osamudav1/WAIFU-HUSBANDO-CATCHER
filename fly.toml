app = "waifu-catcher"
primary_region = "sin"

[build]

[env]
  FLY_APP_NAME = "waifu-catcher"

[http_service]
  internal_port = 8080
  force_https   = false
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout  = "5s"
    path     = "/"
    method   = "GET"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
